<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .student-float { animation: float 3.2s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
    <linearGradient id="skinTone2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5dcc3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#efd4b3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3b5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g class="student-float">
    <!-- Shadow -->
    <ellipse cx="100" cy="260" rx="52" ry="15" fill="#00000016" />
    
    <!-- Large tablet/screen in hand -->
    <rect x="50" y="140" width="80" height="100" rx="12" fill="#2c3e50" 
          style="filter: drop-shadow(12px 16px 24px rgba(108, 92, 231, 0.25));" />
    <rect x="54" y="146" width="72" height="88" rx="10" fill="#34495e" />
    
    <!-- Screen content - lines representing code/content -->
    <line x1="62" y1="160" x2="118" y2="160" stroke="#3498db" stroke-width="2" opacity="0.7" />
    <line x1="62" y1="172" x2="105" y2="172" stroke="#3498db" stroke-width="1.5" opacity="0.6" />
    <line x1="62" y1="182" x2="112" y2="182" stroke="#2ecc71" stroke-width="1.5" opacity="0.6" />
    <line x1="62" y1="192" x2="108" y2="192" stroke="#f39c12" stroke-width="1.5" opacity="0.6" />
    <line x1="62" y1="202" x2="115" y2="202" stroke="#9b59b6" stroke-width="1.5" opacity="0.6" />
    <line x1="62" y1="212" x2="102" y2="212" stroke="#3498db" stroke-width="1.5" opacity="0.6" />
    
    <!-- Screen glow -->
    <rect x="54" y="146" width="72" height="88" rx="10" fill="none" stroke="#3498db" stroke-width="1" opacity="0.3" />
    
    <!-- Body -->
    <rect x="60" y="110" width="80" height="85" rx="22" fill="#2ecc71" 
          style="filter: drop-shadow(11px 15px 22px rgba(46, 204, 113, 0.24));" />
    <rect x="62" y="112" width="76" height="28" rx="16" fill="#27ae60" opacity="0.7" />
    
    <!-- Buttons on shirt -->
    <circle cx="100" cy="125" r="2.5" fill="#229954" opacity="0.6" />
    <circle cx="100" cy="140" r="2.5" fill="#229954" opacity="0.6" />
    
    <!-- Arms holding tablet -->
    <ellipse cx="55" cy="155" rx="13" ry="48" fill="#f5dcc3" transform="rotate(-30 55 155)"
             style="filter: drop-shadow(9px 11px 16px rgba(46, 204, 113, 0.18));" />
    <ellipse cx="145" cy="155" rx="13" ry="48" fill="#f5dcc3" transform="rotate(30 145 155)"
             style="filter: drop-shadow(9px 11px 16px rgba(46, 204, 113, 0.18));" />
    
    <!-- Hands -->
    <circle cx="35" cy="175" r="13" fill="#f5dcc3" style="filter: drop-shadow(5px 7px 12px rgba(0, 0, 0, 0.1));" />
    <circle cx="165" cy="175" r="13" fill="#f5dcc3" style="filter: drop-shadow(5px 7px 12px rgba(0, 0, 0, 0.1));" />
    
    <!-- Head -->
    <circle cx="100" cy="70" r="42" fill="#f5dcc3"
            style="filter: drop-shadow(13px 15px 28px rgba(46, 204, 113, 0.26));" />
    
    <!-- Hair -->
    <ellipse cx="100" cy="38" rx="45" ry="36" fill="#4a2f1a"
             style="filter: drop-shadow(7px 9px 16px rgba(0, 0, 0, 0.16));" />
    
    <!-- Hair texture -->
    <circle cx="72" cy="32" r="8" fill="#6b4a2f" opacity="0.5" />
    <circle cx="128" cy="32" r="8" fill="#6b4a2f" opacity="0.5" />
    
    <!-- Eyes - focused and bright -->
    <circle cx="84" cy="65" r="5.5" fill="#1a1a1a" />
    <circle cx="116" cy="65" r="5.5" fill="#1a1a1a" />
    <circle cx="87" cy="62" r="2.5" fill="#fff" />
    <circle cx="119" cy="62" r="2.5" fill="#fff" />
    
    <!-- Engaged expression -->
    <path d="M 82 80 Q 100 88 118 80" stroke="#8b6b3d" stroke-width="2" fill="none" stroke-linecap="round" />
    <circle cx="100" cy="82" r="1.5" fill="#8b6b3d" />
    
    <!-- Nose -->
    <line x1="100" y1="62" x2="100" y2="78" stroke="#d4a574" stroke-width="1.5" />
    
    <!-- Achievement glow -->
    <circle cx="100" cy="70" r="48" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.2" />
    <circle cx="100" cy="70" r="54" fill="none" stroke="#27ae60" stroke-width="0.8" opacity="0.1" class="pulse" />
  </g>
</svg>